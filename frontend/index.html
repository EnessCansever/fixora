    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SoftwareApplication",
            "name": "Fixora",
            "url": "https://getfixora.dev/",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": "Web",
            "inLanguage": "tr-TR",
            "description": "İngilizce yazılım hata mesajlarını Türkçe, sade ve uygulanabilir çözüm adımlarına dönüştüren yapay zekâ destekli geliştirici aracı.",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            }
          },
          {
            "@type": "WebSite",
            "name": "Fixora",
            "url": "https://getfixora.dev/",
            "inLanguage": "tr-TR"
          }
        ]
      }
    </script>
    
    <script>
      ;(() => {
        const themeKey = 'fixora-theme'
        const root = document.documentElement

        try {
          const savedTheme = localStorage.getItem(themeKey)
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const shouldUseDark = savedTheme ? savedTheme === 'dark' : prefersDark

          root.classList.toggle('dark', shouldUseDark)
          root.style.colorScheme = shouldUseDark ? 'dark' : 'light'
        } catch {
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          root.classList.toggle('dark', prefersDark)
          root.style.colorScheme = prefersDark ? 'dark' : 'light'
        }
      })()
    </script>
    <title>Fixora - Hata Mesajlarını Türkçeleştir</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
